# .goreleaser.yaml
version: 2 # 必须声明为 v2 语法

before:
  hooks:
    # 每次构建前清理模块并下载依赖
    - go mod tidy
    - go mod download

builds:
  - env:
      - CGO_ENABLED=0 # 禁用 CGO，确保生成纯静态链接的二进制文件
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # 指定 main.go 的路径（根据 NeoCode 的实际目录调整）
    main: ./cmd/neocode/main.go 
    # 编译出的二进制文件名
    binary: neocode

archives:
  - format: tar.gz
    # 为 Windows 提供单独的 zip 格式
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# ================= 新增：包管理器分发配置 =================

# 1. 生成 Debian (.deb) 安装包
nfpms:
  - id: default
    file_name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    homepage: "https://github.com/pionxe/neocode" # 换成官方或你的仓库地址
    description: "A local Coding Agent MVP."
    maintainer: "NeoCode Team"
    formats:
      - deb

# 2. 生成 Homebrew 配方并自动推送到你的 homebrew-neocode 仓库
brews:
  - repository:
      owner: pionxe  # <--- 改成你的 GitHub 用户名
      name: homebrew-neocode       # 你刚才建好的仓库名
      token: "{{ .Env.TAP_GITHUB_TOKEN }}" # 使用刚才传进来的秘钥
    directory: Formula
    homepage: "https://github.com/pionxe/neocode"
    description: "A local Coding Agent MVP."
    test: |
      system "#{bin}/neocode --version" # 简单的安装后测试脚本

# 3. 生成 Scoop 清单并自动推送到你的 scoop-bucket 仓库
scoops:
  - repository:
      owner: pionxe  # <--- 改成你的 GitHub 用户名
      name: scoop-bucket           # 你刚才建好的仓库名
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pionxe/neocode"
    description: "A local Coding Agent MVP."